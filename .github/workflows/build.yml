name: Release MedStitch

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v1.2.3)"
        required: true
        type: string

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate build version file
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"

          echo "APP_BUILD_VERSION = \"$VERSION\"" > gui/build_version.py
          cat gui/build_version.py

      - name: Build GUI package
        run: python -m scripts.build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedStitch-windows-${{ github.sha }}
          path: dist/SmartStitch
          if-no-files-found: error
          retention-days: 14

  publish-release:
    needs: build-windows
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: MedStitch-windows-${{ github.sha }}
          path: dist/SmartStitch

      - name: Package release zip
        shell: pwsh
        run: |
          $version = "${{ env.RELEASE_TAG }}"
          $zipName = "MedStitch-$version-windows.zip"
          if (Test-Path $zipName) { Remove-Item $zipName -Force }
          Compress-Archive -Path "dist/SmartStitch/*" -DestinationPath $zipName -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: MedStitch ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            MedStitch-${{ env.RELEASE_TAG }}-windows.zip
