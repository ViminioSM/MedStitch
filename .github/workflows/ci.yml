name: CI MedStitch

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate build version file
        shell: bash
        run: |
          VERSION=""
          TITLE="${{ github.event.head_commit.message }}"
          TITLE="${TITLE%%$'\n'*}"
          if [[ "$TITLE" =~ (^|[^0-9])v?([0-9]+\.[0-9]+\.[0-9]+)([^0-9]|$) ]]; then
            VERSION="${BASH_REMATCH[2]}"
          fi

          if [[ -z "$VERSION" ]]; then
            VERSION="0.0.0"
          fi

          echo "APP_BUILD_VERSION = \"$VERSION\"" > gui/build_version.py
          cat gui/build_version.py

      - name: Build GUI package
        run: python -m scripts.build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MedStitch-windows-${{ github.sha }}
          path: dist/SmartStitch
          if-no-files-found: error
          retention-days: 14
